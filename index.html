<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mabanks Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); 
            color: white; 
            text-align: center; 
            font-family: 'Arial', sans-serif; 
            margin: 0; 
            overflow: hidden; 
            user-select: none;
        }
        .container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        #balance { font-size: 48px; margin: 10px 0; color: #fbbf24; text-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
        .coin-btn {
            width: 250px;
            height: 250px;
            background: url('https://i.ibb.co/3ykXG3p/maba-coin.png') no-repeat center;
            background-size: contain;
            border: none;
            cursor: pointer;
            transition: transform 0.1s ease;
            filter: drop-shadow(0 0 20px #fbbf24);
        }
        .coin-btn:active { transform: scale(0.92); }
        p { opacity: 0.6; font-size: 14px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <p>MABANKS BALANCE</p>
        <div id="balance">0</div>
        <button class="coin-btn" id="coin"></button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let count = 0;
        const balanceDisplay = document.getElementById('balance');
        const coinBtn = document.getElementById('coin');

        coinBtn.addEventListener('click', () => {
            count++;
            balanceDisplay.innerText = count;
            tg.HapticFeedback.impactOccurred('medium'); // Вибрация
        });
    </script>
</body>
</html>
