<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        :root {
            --bg: #0b0e16; --panel: #161b28; --accent: #3b82f6; --gold: #facc15;
            --text: #ffffff; --green: #22c55e;
        }

        body {
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* Gifts Battle Top Bar */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(22, 27, 40, 0.95);
            border-bottom: 2px solid #ffffff05;
        }

        .user-pill { display: flex; align-items: center; gap: 8px; background: #1e293b; padding: 4px 10px; border-radius: 12px; }
        .avatar { width: 24px; height: 24px; border-radius: 6px; background: var(--accent); }

        .currency-bar { display: flex; gap: 10px; }
        .balance-badge {
            background: #111827; border: 1px solid #ffffff10;
            padding: 6px 12px; border-radius: 100px; display: flex; align-items: center; gap: 6px;
            font-weight: 800; font-family: 'Luckiest Guy', cursive;
        }

        /* Контент */
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        
        /* Banner а-ля Gifts Battle */
        .event-banner {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Секция кейсов */
        .section-title { font-weight: 800; margin-bottom: 15px; font-size: 18px; color: var(--text); }
        .case-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .case-card {
            background: var(--panel); border-radius: 20px; padding: 15px;
            text-align: center; border: 1px solid #ffffff05; position: relative;
        }
        .case-icon { font-size: 50px; margin-bottom: 10px; display: block; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
        
        .buy-btn {
            background: var(--green); color: white; border: none; width: 100%;
            padding: 10px; border-radius: 12px; font-family: 'Luckiest Guy';
            font-size: 16px; margin-top: 10px; cursor: pointer;
            box-shadow: 0 4px 0 #15803d; transition: 0.1s;
        }
        .buy-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #15803d; }

        /* Тапалка */
        .tap-area { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .maba-coin {
            width: 250px; height: 250px;
            background: url('https://i.ibb.co/Gfjby14B/maba-coin.png') center/contain no-repeat;
            cursor: pointer; transition: transform 0.05s;
            filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.4));
        }

        /* Навигация */
        .footer-nav {
            position: fixed; bottom: 0; width: 100%; background: #0f172a;
            display: flex; justify-content: space-around; padding: 12px 0 25px;
            border-top: 1px solid #ffffff05;
        }
        .nav-link { color: #64748b; font-size: 22px; background: none; border: none; }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-pill">
            <div class="avatar"></div>
            <span id="u-name" style="font-size: 12px; font-weight: bold;">PLAYER</span>
        </div>
        <div class="currency-bar">
            <div class="balance-badge" style="color: var(--gold); border-color: var(--gold);">
                ★ <span id="stars-val">0</span>
            </div>
        </div>
    </div>

    <div class="content">
        <div id="tap-page" class="page-container">
            <div class="tap-area">
                <div class="maba-coin" id="coin"></div>
                <h1 style="font-family: 'Luckiest Guy'; margin-top: 20px; color: var(--accent);">TAP TO EARN</h1>
            </div>
        </div>

        <div id="shop-page" class="page-container" style="display:none;">
            <div class="event-banner">
                <h2 style="margin:0; font-family: 'Luckiest Guy';">MABANKS BATTLE</h2>
                <p style="font-size: 12px; opacity: 0.8;">Выбивай редкие скины!</p>
            </div>

            <div class="section-title">КЕЙСЫ</div>
            <div class="case-grid">
                <div class="case-card">
                    <span class="case-icon">📦</span>
                    <div style="font-weight: bold;">БОМЖ</div>
                    <button class="buy-btn" onclick="requestPayment(100, 'Бомж')">100 ★</button>
                </div>
                <div class="case-card">
                    <span class="case-icon">💼</span>
                    <div style="font-weight: bold;">РАБОТЯГА</div>
                    <button class="buy-btn" onclick="requestPayment(200, 'Работяга')">200 ★</button>
                </div>
                <div class="case-card">
                    <span class="case-icon">🎰</span>
                    <div style="font-weight: bold;">ЛУДКА</div>
                    <button class="buy-btn" onclick="requestPayment(500, 'Лудка')">500 ★</button>
                </div>
                <div class="case-card">
                    <span class="case-icon">🏎️</span>
                    <div style="font-weight: bold;">МАЖОР</div>
                    <button class="buy-btn" onclick="requestPayment(1000, 'Мажор')">1000 ★</button>
                </div>
                <div class="case-card" style="grid-column: span 2;">
                    <span class="case-icon">🚀</span>
                    <div style="font-weight: bold; color: var(--gold);">ЗАНОС</div>
                    <button class="buy-btn" onclick="requestPayment(1999, 'Занос')">1999 ★</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-nav">
        <button class="nav-link active" onclick="tab('tap-page', this)"><i class="fas fa-hand-pointer"></i></button>
        <button class="nav-link" onclick="tab('shop-page', this)"><i class="fas fa-box-open"></i></button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function tab(id, el) {
            document.getElementById('tap-page').style.display = 'none';
            document.getElementById('shop-page').style.display = 'none';
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        document.getElementById('coin').onclick = (e) => {
            tg.HapticFeedback.impactOccurred('medium');
            e.target.style.transform = 'scale(0.9)';
            setTimeout(() => e.target.style.transform = 'scale(1)', 50);
        };

        // ФУНКЦИЯ СПИСАНИЯ ЗВЕЗД
        function requestPayment(amount, title) {
            // Отправляем данные боту, чтобы он выставил счет Stars
            tg.sendData(JSON.stringify({
                method: "stars_pay",
                amount: amount,
                title: title
            }));
        }

        let user = tg.initDataUnsafe?.user;
        if(user) document.getElementById('u-name').innerText = user.first_name.toUpperCase();
    </script>
</body>
</html>
