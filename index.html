<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0e16;
            --card-bg: #161b28;
            --accent: #3b82f6;
            --gold: #facc15;
            --text-main: #ffffff;
            --text-secondary: #94a3b8;
        }

        body {
            background: var(--bg); color: var(--text-main);
            font-family: 'Inter', sans-serif; margin: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* Верхняя панель */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(11, 14, 22, 0.8);
            backdrop-filter: blur(10px); z-index: 100;
        }

        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { 
            width: 35px; height: 35px; border-radius: 8px; 
            background: linear-gradient(135deg, #3b82f6, #2dd4bf); 
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; border: 2px solid #ffffff20;
        }
        
        .stars-badge {
            background: #1e293b; padding: 5px 12px; border-radius: 20px;
            display: flex; align-items: center; gap: 5px; font-weight: bold;
            border: 1px solid #ffffff10;
        }

        /* Страницы */
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; position: relative; }
        .page { display: none; height: 100%; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Тапалка (3D) */
        #canvas-container { width: 100%; height: 60vh; position: relative; }
        #canvas-3d { width: 100%; height: 100%; }
        .tap-hint { text-align: center; color: var(--text-secondary); font-size: 14px; margin-top: -20px; }

        /* Промокоды */
        .promo-box { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid #ffffff05; text-align: center; }
        .promo-input { 
            width: 90%; padding: 12px; border-radius: 10px; border: 1px solid #334155; 
            background: #0b0e16; color: white; margin-bottom: 15px; font-size: 16px; text-align: center;
        }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; width: 100%; }

        /* Кейсы */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .case-item { background: var(--card-bg); border-radius: 16px; padding: 15px; text-align: center; border: 1px solid #ffffff05; transition: 0.2s; }
        .case-item:active { transform: scale(0.95); }
        .case-img { width: 80px; height: 80px; margin: 0 auto 10px; }

        /* Нижнее меню */
        .nav {
            position: fixed; bottom: 0; width: 100%; background: #111827;
            display: flex; justify-content: space-around; padding: 10px 0 25px;
            border-top: 1px solid #ffffff05; z-index: 100;
        }
        .nav-btn { background: none; border: none; color: var(--text-secondary); display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 10px; transition: 0.2s; cursor: pointer; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn i { font-size: 20px; }
        .nav-center {
            width: 50px; height: 50px; background: var(--accent); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin-top: -25px;
            color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="user-info">
            <div class="avatar" id="user-avatar">M</div>
            <span style="font-weight: bold;" id="user-name">MABANKS</span>
        </div>
        <div class="stars-badge">
            <span style="color: var(--gold)">★</span>
            <span id="balance">0</span>
        </div>
    </div>

    <div class="content">
        <div id="tap-page" class="page active">
            <h2 style="text-align: center; margin: 0;">Добыча MBA</h2>
            <div id="canvas-container">
                <canvas id="canvas-3d"></canvas>
            </div>
            <div class="tap-hint">Тапай по монете (+10 MBA)</div>
        </div>

        <div id="cases-page" class="page">
            <h2 style="margin-bottom: 15px;">Магазин Кейсов</h2>
            <div class="grid">
                <div class="case-item" onclick="openCase('Бомж', 100)">
                    <div class="case-img" style="background: url('https://cdn-icons-png.flaticon.com/512/679/679821.png') center/contain no-repeat;"></div>
                    <div style="font-size: 14px; font-weight: bold;">Бомж</div>
                    <div style="font-size: 11px; color: var(--text-secondary); margin-top: 4px;">100 MBA</div>
                </div>
                <div class="case-item" onclick="openCase('Мажор', 1000)">
                    <div class="case-img" style="background: url('https://cdn-icons-png.flaticon.com/512/679/679713.png') center/contain no-repeat;"></div>
                    <div style="font-size: 14px; font-weight: bold;">Мажор</div>
                    <div style="font-size: 11px; color: var(--text-secondary); margin-top: 4px;">1000 MBA</div>
                </div>
            </div>
        </div>

        <div id="promo-page" class="page">
            <h2 style="margin-bottom: 15px;">Промокоды</h2>
            <div class="promo-box">
                <p style="color: var(--text-secondary); font-size: 13px; margin-bottom: 15px;">Введи секретный код, чтобы получить MBA токены.</p>
                <input type="text" id="promo-input" class="promo-input" placeholder="Введи код...">
                <button class="btn-primary" onclick="activatePromo()">Активировать</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn active" onclick="switchTab('tap-page', this)"><i class="fas fa-hand-pointer"></i><span>Тап</span></button>
        <button class="nav-btn" onclick="switchTab('promo-page', this)"><i class="fas fa-ticket-alt"></i><span>Промо</span></button>
        <button class="nav-btn" onclick="switchTab('cases-page', this)"><div class="nav-center"><i class="fas fa-box-open"></i></div><span>Кейсы</span></button>
        <button class="nav-btn"><i class="fas fa-trophy"></i><span>Топ</span></button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let balance = 0;
        let usedPromos = [];

        // Получаем данные юзера из Telegram
        let user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name;
            document.getElementById('user-avatar').innerText = user.first_name.charAt(0).toUpperCase();
        }

        // Обновление интерфейса
        function updateUI() {
            document.getElementById('balance').innerText = balance;
        }

        // Навигация по страницам
        function switchTab(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        // Логика промокодов
        function activatePromo() {
            let code = document.getElementById('promo-input').value.toUpperCase().trim();
            if (code === "") return;
            
            if (usedPromos.includes(code)) {
                alert("❌ Ты уже использовал этот код!");
                return;
            }

            if (code === "MABANKS2026") {
                balance += 5000;
                usedPromos.push(code);
                updateUI();
                alert("✅ Промокод активирован! Начислено +5000 MBA");
                document.getElementById('promo-input').value = "";
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                alert("❌ Неверный промокод!");
                tg.HapticFeedback.notificationOccurred('error');
            }
        }

        // Логика кейсов
        function openCase(name, price) {
            if (balance >= price) {
                balance -= price;
                updateUI();
                tg.HapticFeedback.impactOccurred('heavy');
                alert("🎁 Ты открыл кейс: " + name);
            } else {
                alert("❌ Недостаточно MBA для покупки!");
                tg.HapticFeedback.notificationOccurred('error');
            }
        }

        // --- 3D МОНЕТКА ---
        const canvasContainer = document.getElementById('canvas-container');
        const canvas = document.getElementById('canvas-3d');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, canvasContainer.clientWidth / canvasContainer.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);

        const geometry = new THREE.CylinderGeometry(2, 2, 0.3, 64);
        const material = new THREE.MeshPhongMaterial({ color: 0xFFD700, specular: 0x555555, shininess: 50 });
        const coin = new THREE.Mesh(geometry, material);
        coin.rotation.x = Math.PI / 2;
        scene.add(coin);

        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(2, 2, 5);
        scene.add(dirLight);

        camera.position.z = 5;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            balance += 10;
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
            coin.rotation.x -= 0.3;
            setTimeout(() => coin.rotation.x += 0.3, 100);
        });

        function animate() {
            requestAnimationFrame(animate);
            coin.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
