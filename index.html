<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💎 MBA • TON Clicker</title>
    
    <!-- TON Connect SDK -->
    <script src="https://unpkg.com/@tonconnect/ui@2.0.0/dist/tonconnect-ui.min.js"></script>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 30% 10%, #1a1f35 0%, #0a0d1a 100%);
            color: white;
            min-height: 100vh;
            user-select: none;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированный фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(100, 200, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 200, 100, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(200, 100, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            max-width: 420px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Стеклянный морфизм */
        .glass-card {
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 200, 255, 0.15);
            border-radius: 28px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 20px;
        }

        /* Хедер */
        .header-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 16px 20px;
        }

        .balance-block {
            display: flex;
            flex-direction: column;
        }

        .balance-label {
            font-size: 11px;
            color: #8a9bb5;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .balance-value {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a0e9ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .balance-currency {
            font-size: 14px;
            color: #a0e9ff;
            margin-left: 4px;
            -webkit-text-fill-color: #a0e9ff;
        }

        .ton-connect-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        #connect-wallet-btn {
            background: linear-gradient(135deg, #0088CC 0%, #0055AA 100%);
            border: none;
            color: white;
            font-weight: 700;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #connect-wallet-btn.connected {
            background: linear-gradient(135deg, #00C851 0%, #007E33 100%);
            box-shadow: 0 4px 15px rgba(0, 200, 81, 0.4);
        }

        #connect-wallet-btn:hover {
            transform: translateY(-2px);
        }

        #connect-wallet-btn:active {
            transform: translateY(0);
        }

        .wallet-address {
            font-size: 11px;
            color: #a0e9ff;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 8px;
            border-radius: 20px;
        }

        /* Табы */
        .tabs-container {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            padding: 4px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 60px;
            backdrop-filter: blur(10px);
        }

        .tab {
            flex: 1;
            background: transparent;
            border: none;
            color: #8a9bb5;
            font-size: 18px;
            font-weight: 600;
            padding: 14px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab.active {
            background: linear-gradient(135deg, #1a3a5c 0%, #0f2440 100%);
            color: white;
            box-shadow: 
                0 4px 15px rgba(0, 200, 255, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(0, 200, 255, 0.3);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Кликер */
        .clicker-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            position: relative;
        }

        .coin-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .coin-glow-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulseGlow 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        .coin-image {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.5));
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .coin-image:active {
            transform: scale(0.92);
        }

        .coin-svg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            animation: rotateCoin 20s linear infinite;
            border: 4px solid rgba(255, 215, 0, 0.8);
            box-shadow: 
                0 0 60px rgba(255, 215, 0, 0.4),
                inset 0 0 40px rgba(255, 215, 0, 0.2);
        }

        @keyframes rotateCoin {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .tap-hint {
            color: #a0e9ff;
            font-size: 16px;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0, 200, 255, 0.5);
            margin-top: 10px;
        }

        .tap-effect {
            position: absolute;
            top: 30%;
            left: 55%;
            color: #FFD700;
            font-weight: 800;
            font-size: 32px;
            text-shadow: 
                0 0 30px #FFD700,
                0 0 60px #FFA500;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
            transition: all 0.2s;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .withdraw-btn {
            width: 100%;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: none;
            color: #0a0d1a;
            font-weight: 800;
            font-size: 18px;
            padding: 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 
                0 8px 20px rgba(255, 215, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .withdraw-btn:active {
            transform: scale(0.97);
            box-shadow: 0 4px 10px rgba(255, 215, 0, 0.3);
        }

        .withdraw-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Кейсы */
        .cases-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .case-card {
            background: rgba(15, 25, 45, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 200, 255, 0.2);
            border-radius: 24px;
            padding: 24px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .case-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d4ff, transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .case-card:hover::before {
            opacity: 1;
        }

        .case-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .case-icon {
            font-size: 48px;
            filter: drop-shadow(0 0 20px rgba(0, 200, 255, 0.5));
        }

        .case-info {
            flex: 1;
        }

        .case-name {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a0e9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .case-chance {
            font-size: 14px;
            color: #8a9bb5;
        }

        .case-cost {
            font-size: 18px;
            font-weight: 700;
            color: #FFD700;
            margin-bottom: 15px;
        }

        .open-case-btn {
            width: 100%;
            background: linear-gradient(135deg, #2a4a6a 0%, #0e1a2b 100%);
            border: 1px solid #4a9eff;
            color: white;
            font-weight: 700;
            padding: 14px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 0 #0a121f;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .open-case-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Статистика */
        .stats-container {
            margin-top: 20px;
            padding: 20px;
            text-align: center;
        }

        .stats-title {
            color: #8a9bb5;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stats-value {
            font-size: 24px;
            font-weight: 800;
            color: #FFD700;
        }

        /* Адаптивность */
        @media (max-width: 400px) {
            .coin-wrapper {
                width: 240px;
                height: 240px;
            }
            .balance-value {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Хедер -->
        <header>
            <div class="glass-card header-card">
                <div class="balance-block">
                    <span class="balance-label">MBA BALANCE</span>
                    <div>
                        <span class="balance-value" id="balanceDisplay">0</span>
                        <span class="balance-currency">$MBA</span>
                    </div>
                </div>
                <div class="ton-connect-wrapper">
                    <button id="connect-wallet-btn">
                        💎 Connect TON
                    </button>
                    <div id="walletAddress" class="wallet-address"></div>
                </div>
            </div>
        </header>

        <!-- Табы -->
        <div class="tabs-container">
            <button class="tab active" data-tab="clicker">💎 Кликер</button>
            <button class="tab" data-tab="cases">🎁 Кейсы</button>
        </div>

        <!-- Контент кликера -->
        <div id="clickerTab" class="tab-content active">
            <div class="glass-card">
                <div class="clicker-area">
                    <div class="coin-wrapper" id="coin">
                        <div class="coin-glow-effect"></div>
                        <div class="coin-image">
                            <svg class="coin-svg" viewBox="0 0 200 200">
                                <defs>
                                    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
                                        <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
                                        <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
                                    </linearGradient>
                                    <filter id="glow">
                                        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                                        <feMerge>
                                            <feMergeNode in="coloredBlur"/>
                                            <feMergeNode in="SourceGraphic"/>
                                        </feMerge>
                                    </filter>
                                </defs>
                                <circle cx="100" cy="100" r="95" fill="url(#coinGrad)" filter="url(#glow)"/>
                                <circle cx="100" cy="100" r="85" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.5"/>
                                <text x="100" y="120" text-anchor="middle" fill="#8B4513" font-size="60" font-weight="900" font-family="Inter" filter="url(#glow)">MBA</text>
                                <text x="100" y="150" text-anchor="middle" fill="#654321" font-size="16" font-weight="700" font-family="Inter">TON</text>
                                <circle cx="100" cy="100" r="90" fill="none" stroke="#FFF8DC" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
                            </svg>
                        </div>
                        <div id="tapEffect" class="tap-effect">+1</div>
                    </div>
                    <p class="tap-hint">✨ 1 ТАП = 1 $MBA (0.001 TON)</p>
                </div>
                
                <div class="action-buttons">
                    <button id="withdrawBtn" class="withdraw-btn">
                        💎 Вывести в TON
                    </button>
                </div>
            </div>
        </div>

        <!-- Контент кейсов -->
        <div id="casesTab" class="tab-content">
            <div class="cases-grid">
                <!-- Common Case -->
                <div class="case-card">
                    <div class="case-header">
                        <div class="case-icon">📦</div>
                        <div class="case-info">
                            <div class="case-name">COMMON CASE</div>
                            <div class="case-chance">Шанс NFT: 10%</div>
                        </div>
                    </div>
                    <div class="case-cost">💰 50 $MBA</div>
                    <button class="open-case-btn" data-case="common" data-cost="50">
                        Открыть кейс
                    </button>
                </div>

                <!-- Rare Case -->
                <div class="case-card">
                    <div class="case-header">
                        <div class="case-icon">✨</div>
                        <div class="case-info">
                            <div class="case-name">RARE CASE</div>
                            <div class="case-chance">Шанс NFT: 40%</div>
                        </div>
                    </div>
                    <div class="case-cost">💰 200 $MBA</div>
                    <button class="open-case-btn" data-case="rare" data-cost="200">
                        Открыть кейс
                    </button>
                </div>

                <!-- Legendary Case -->
                <div class="case-card">
                    <div class="case-header">
                        <div class="case-icon">👑</div>
                        <div class="case-info">
                            <div class="case-name">LEGENDARY</div>
                            <div class="case-chance">Шанс NFT: 100%</div>
                        </div>
                    </div>
                    <div class="case-cost">💰 1000 $MBA</div>
                    <button class="open-case-btn" data-case="legendary" data-cost="1000">
                        Открыть кейс
                    </button>
                </div>
            </div>

            <!-- Статистика открытых кейсов -->
            <div class="glass-card stats-container">
                <div class="stats-title">🎯 ВСЕГО ОТКРЫТО КЕЙСОВ</div>
                <div class="stats-value" id="casesOpened">0</div>
            </div>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // Состояние приложения
        let userBalance = 1000;
        let casesOpened = 0;
        let tapCounter = 0;
        const TAP_BATCH_SIZE = 10;
        let connectedWallet = null;

        // DOM элементы
        const balanceDisplay = document.getElementById('balanceDisplay');
        const casesOpenedDisplay = document.getElementById('casesOpened');
        const coin = document.getElementById('coin');
        const tapEffect = document.getElementById('tapEffect');
        const withdrawBtn = document.getElementById('withdrawBtn');
        const connectWalletBtn = document.getElementById('connect-wallet-btn');
        const walletAddressDiv = document.getElementById('walletAddress');

        // Инициализация TON Connect
        let tonConnectUI;
        
        try {
            tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                manifestUrl: 'https://gist.githubusercontent.com/anonymous/tonconnect-manifest.json/raw/manifest.json',
                buttonRootId: 'connect-wallet-btn'
            });

            // Подписываемся на изменения статуса кошелька
            tonConnectUI.onStatusChange(wallet => {
                if (wallet) {
                    connectedWallet = wallet;
                    const address = wallet.account.address;
                    const shortAddress = `${address.slice(0, 6)}...${address.slice(-4)}`;
                    walletAddressDiv.textContent = shortAddress;
                    connectWalletBtn.textContent = '✅ TON CONNECTED';
                    connectWalletBtn.classList.add('connected');
                    
                    console.log('✅ Кошелек подключен:', address);
                    
                    // Отправляем адрес боту
                    if (tg.sendData) {
                        tg.sendData(JSON.stringify({
                            action: 'wallet_connected',
                            wallet_address: address
                        }));
                    }
                } else {
                    connectedWallet = null;
                    walletAddressDiv.textContent = '';
                    connectWalletBtn.textContent = '💎 Connect TON';
                    connectWalletBtn.classList.remove('connected');
                    
                    console.log('❌ Кошелек отключен');
                }
            });

            console.log('✅ TON Connect UI инициализирован');
        } catch (e) {
            console.error('❌ Ошибка инициализации TON Connect:', e);
            connectWalletBtn.addEventListener('click', () => {
                tg.showAlert('TON Connect временно недоступен. Попробуйте позже.');
            });
        }

        // Функция обновления UI баланса
        function updateBalanceUI() {
            balanceDisplay.textContent = userBalance.toLocaleString();
        }

        // Функция обновления статистики кейсов
        function updateCasesStats() {
            casesOpenedDisplay.textContent = casesOpened;
        }

        // Анимация тапа
        function showTapAnimation() {
            tapEffect.style.opacity = '1';
            tapEffect.style.transform = 'translateY(-30px) scale(1.2)';
            
            setTimeout(() => {
                tapEffect.style.opacity = '0';
                tapEffect.style.transform = 'translateY(0) scale(1)';
            }, 200);
        }

        // Обработка клика по монете
        coin.addEventListener('click', (e) => {
            userBalance += 1;
            tapCounter += 1;
            
            updateBalanceUI();
            showTapAnimation();
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
            
            if (tapCounter >= TAP_BATCH_SIZE) {
                if (tg.sendData) {
                    tg.sendData(JSON.stringify({
                        action: 'tap',
                        count: tapCounter
                    }));
                }
                tapCounter = 0;
            }
        });

        // Сохранение оставшихся тапов при закрытии
        window.addEventListener('beforeunload', () => {
            if (tapCounter > 0 && tg.sendData) {
                tg.sendData(JSON.stringify({
                    action: 'tap',
                    count: tapCounter
                }));
            }
        });

        // Открытие кейсов
        document.querySelectorAll('.open-case-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const caseType = e.target.dataset.case;
                const cost = parseInt(e.target.dataset.cost);
                
                if (userBalance >= cost) {
                    userBalance -= cost;
                    casesOpened++;
                    
                    updateBalanceUI();
                    updateCasesStats();
                    
                    let nftChance = 0;
                    if (caseType === 'common') nftChance = 0.1;
                    else if (caseType === 'rare') nftChance = 0.4;
                    else if (caseType === 'legendary') nftChance = 1.0;
                    
                    const gotNFT = Math.random() < nftChance;
                    const nftId = Math.floor(Math.random() * 10000);
                    
                    let message = '';
                    let title = '';
                    
                    if (gotNFT) {
                        title = '🎉 ПОЗДРАВЛЯЕМ!';
                        message = `Вам выпал NFT!\n\n🏆 MBA Genesis #${nftId}\n\nОткрыть кошелек TON для получения?`;
                    } else {
                        title = '😢 УВЫ!';
                        message = `NFT не выпал.\n\nПопробуйте ещё раз!\n\nВаш баланс: ${userBalance} $MBA`;
                    }
                    
                    tg.showPopup({
                        title: title,
                        message: message,
                        buttons: gotNFT ? [
                            {id: 'wallet', type: 'default', text: '💎 ОТКРЫТЬ КОШЕЛЕК'},
                            {type: 'cancel', text: 'ЗАКРЫТЬ'}
                        ] : [
                            {type: 'ok', text: 'ПОНЯТНО'}
                        ]
                    }, (buttonId) => {
                        if (buttonId === 'wallet' && tonConnectUI) {
                            tonConnectUI.openModal();
                        }
                    });
                    
                    if (tg.sendData) {
                        tg.sendData(JSON.stringify({
                            action: 'open_case',
                            case_type: caseType,
                            got_nft: gotNFT,
                            nft_id: gotNFT ? nftId : null
                        }));
                    }
                    
                    if (tg.HapticFeedback) {
                        tg.HapticFeedback.notificationOccurred(gotNFT ? 'success' : 'warning');
                    }
                    
                } else {
                    tg.showAlert(`❌ Недостаточно $MBA!\n\nНужно ещё ${cost - userBalance} $MBA\n\nПродолжайте тапать!`);
                    
                    if (tg.HapticFeedback) {
                        tg.HapticFeedback.notificationOccurred('error');
                    }
                }
            });
        });

        // Вывод средств в TON
        withdrawBtn.addEventListener('click', () => {
            // Проверяем подключен ли кошелек
            if (!connectedWallet) {
                tg.showPopup({
                    title: '💎 Требуется кошелек',
                    message: 'Для вывода средств необходимо подключить TON кошелек.\n\nПодключить сейчас?',
                    buttons: [
                        {id: 'connect', type: 'default', text: '💎 ПОДКЛЮЧИТЬ'},
                        {type: 'cancel', text: 'ОТМЕНА'}
                    ]
                }, (buttonId) => {
                    if (buttonId === 'connect' && tonConnectUI) {
                        tonConnectUI.openModal();
                    }
                });
                return;
            }
            
            const requiredMBA = 1000;
            
            if (userBalance >= requiredMBA) {
                const tonAmount = (userBalance / 1000000).toFixed(6); // 1,000,000 MBA = 1 TON
                
                tg.showPopup({
                    title: '💎 ВЫВОД В TON',
                    message: `Вы хотите вывести ${userBalance.toLocaleString()} $MBA?\n\n💰 Сумма: ${tonAmount} TON\n👛 Кошелек: ${walletAddressDiv.textContent}\n\nСредства будут отправлены в течение 24 часов.`,
                    buttons: [
                        {id: 'confirm', type: 'default', text: '✅ ПОДТВЕРДИТЬ'},
                        {type: 'cancel', text: '❌ ОТМЕНА'}
                    ]
                }, (buttonId) => {
                    if (buttonId === 'confirm') {
                        // Отправляем запрос на вывод
                        if (tg.sendData) {
                            tg.sendData(JSON.stringify({
                                action: 'withdraw_ton',
                                amount_mba: userBalance,
                                amount_ton: parseFloat(tonAmount),
                                wallet_address: connectedWallet.account.address
                            }));
                        }
                        
                        tg.showAlert(`✅ Заявка на вывод ${tonAmount} TON отправлена!\n\nОжидайте зачисления на кошелек.`);
                        
                        // Списываем баланс
                        userBalance = 0;
                        updateBalanceUI();
                        
                        if (tg.HapticFeedback) {
                            tg.HapticFeedback.notificationOccurred('success');
                        }
                    }
                });
            } else {
                const needed = requiredMBA - userBalance;
                tg.showAlert(`❌ Недостаточно $MBA для вывода!\n\nМинимальная сумма: 1,000 $MBA\nНужно ещё: ${needed} $MBA\n\nПродолжайте тапать!`);
                
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('error');
                }
            }
        });

        // Переключение табов
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const targetTab = tab.dataset.tab;
                
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                document.getElementById(targetTab + 'Tab').classList.add('active');
                
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.selectionChanged();
                }
            });
        });

        // Инициализация UI
        tg.ready();
        tg.setHeaderColor('#0a0d1a');
        tg.setBackgroundColor('#0a0d1a');
        updateBalanceUI();
        updateCasesStats();

        console.log('🚀 MBA TON Clicker загружен!');
    </script>
</body>
</html>
