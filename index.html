<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0e16;
            --card-bg: #161b28;
            --accent: #3b82f6;
            --gold: #facc15;
            --text-main: #ffffff;
            --text-secondary: #94a3b8;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(11, 14, 22, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 35px; height: 35px; border-radius: 8px; background: #2dd4bf; border: 2px solid #ffffff20; }
        
        .stars-badge {
            background: #1e293b;
            padding: 5px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            border: 1px solid #ffffff10;
        }

        /* Main Content */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 90px;
        }

        /* Banner Card */
        .banner {
            background: linear-gradient(90deg, #1e40af, #3b82f6);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }
        .banner h2 { margin: 0; font-size: 18px; }
        .banner-timer { font-size: 14px; margin-top: 10px; opacity: 0.9; display: flex; align-items: center; gap: 5px; }

        /* Leaderboard Box */
        .leader-box {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border: 1px solid #ffffff05;
        }

        /* Case Grid */
        .section-title { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 16px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .case-item {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            border: 1px solid #ffffff05;
            transition: 0.2s;
        }
        .case-item:active { transform: scale(0.95); }
        .case-img { width: 80px; height: 80px; margin: 0 auto 10px; }

        /* Bottom Nav */
        .nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #111827;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 25px;
            border-top: 1px solid #ffffff05;
        }
        .nav-btn {
            background: none; border: none; color: var(--text-secondary);
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            font-size: 10px; transition: 0.2s;
        }
        .nav-btn.active { color: var(--accent); }
        .nav-btn i { font-size: 20px; }
        
        .nav-center {
            width: 50px; height: 50px;
            background: var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-top: -25px;
            color: white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="user-info">
            <div class="avatar"></div>
            <span style="font-weight: bold;">MABANKS</span>
        </div>
        <div class="stars-badge">
            <span style="color: var(--gold)">★</span>
            <span id="star-count">0</span>
            <span style="color: var(--accent); margin-left: 5px;">+</span>
        </div>
    </div>

    <div class="main">
        <div class="banner">
            <h2>Конкурс MBA Token</h2>
            <div style="font-size: 12px; opacity: 0.8;">💎 50,000</div>
            <div class="banner-timer">
                <i class="far fa-clock"></i> 0 дней 18:42:10
            </div>
        </div>

        <div class="leader-box">
            <div style="display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-trophy" style="color: var(--gold)"></i>
                <span>Лидерборд</span>
            </div>
            <div style="font-size: 13px; color: var(--text-secondary);">
                Мое место: <span style="color: white; background: #334155; padding: 2px 8px; border-radius: 5px;">1065</span>
            </div>
        </div>

        <div class="section-title">
            <span>Бесплатные Кейсы</span>
            <span style="color: var(--text-secondary); font-size: 12px;">Свернуть <i class="fas fa-chevron-up"></i></span>
        </div>

        <div class="grid">
            <div class="case-item" onclick="openCase('Бомж')">
                <div class="case-img" style="background: url('https://cdn-icons-png.flaticon.com/512/679/679821.png') center/contain no-repeat;"></div>
                <div style="font-size: 14px; font-weight: bold;">Бомж</div>
                <div style="font-size: 11px; color: var(--text-secondary); margin-top: 4px;">Бесплатно</div>
            </div>
            <div class="case-item" onclick="openCase('Работяга')">
                <div class="case-img" style="background: url('https://cdn-icons-png.flaticon.com/512/679/679713.png') center/contain no-repeat;"></div>
                <div style="font-size: 14px; font-weight: bold;">Работяга</div>
                <div style="font-size: 11px; color: var(--text-secondary); margin-top: 4px;">100 MBA</div>
            </div>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn"><i class="fas fa-rocket"></i><span>Апгрейд</span></button>
        <button class="nav-btn"><i class="fas fa-hammer"></i><span>Крафты</span></button>
        <button class="nav-btn active"><div class="nav-center"><i class="fas fa-box-open"></i></div><span>Кейсы</span></button>
        <button class="nav-btn"><i class="fas fa-bolt"></i><span>Конкурсы</span></button>
        <button class="nav-btn"><i class="fas fa-user-group"></i><span>Друзья</span></button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function openCase(name) {
            tg.HapticFeedback.impactOccurred('heavy');
            // Здесь будет логика открытия, как мы делали раньше
            alert("Открываем кейс: " + name);
        }
    </script>
</body>
</html>
