<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #007AFF;
            --gold: #FFD700;
        }

        body {
            background: var(--ios-bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Glassmorphism Header */
        .header {
            backdrop-filter: blur(20px);
            background: var(--glass);
            padding: 25px;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        .balance-label { font-size: 14px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
        .balance-value { font-size: 36px; font-weight: 800; color: var(--gold); margin-top: 5px; }
        .stars-value { font-size: 16px; color: #00FF00; opacity: 0.9; }

        /* Контент страниц */
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Кнопка-Монета */
        .tap-area { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .coin {
            width: 260px; height: 260px;
            background: url('https://i.ibb.co/Gfjby14B/maba-coin.png') no-repeat center;
            background-size: contain;
            border: none; outline: none;
            filter: drop-shadow(0 0 30px rgba(251, 191, 36, 0.3));
            transition: transform 0.05s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .coin:active { transform: scale(0.92) rotate(-3deg); }

        /* Кейсы iOS Style */
        .case-card {
            background: var(--glass);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .case-info h3 { margin: 0; font-size: 18px; }
        .case-info p { margin: 5px 0 0; opacity: 0.5; font-size: 13px; }
        .buy-btn {
            background: white; color: black; border: none;
            padding: 10px 20px; border-radius: 20px; font-weight: 700;
        }

        /* Лидерборд */
        .leader-row {
            display: flex; justify-content: space-between;
            padding: 15px; background: var(--glass);
            margin-bottom: 8px; border-radius: 12px;
        }
        .status-dot { height: 8px; width: 8px; background: #00FF00; border-radius: 50%; display: inline-block; margin-right: 8px; }

        /* Навигация iOS */
        .nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(20px); border-radius: 30px;
            display: flex; justify-content: space-around; padding: 15px 0;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .nav-item { color: #8E8E93; border: none; background: none; font-size: 12px; font-weight: 600; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-label">Баланс MBA Tokens</div>
        <div class="balance-value" id="balance">0</div>
        <div class="stars-value">≈ <span id="stars">0</span> ⭐ Stars</div>
    </div>

    <div class="content">
        <div id="game-page" class="page active">
            <div class="tap-area">
                <button class="coin" id="coin-btn"></button>
                <p style="opacity: 0.5">+10 MBA за тап</p>
            </div>
        </div>

        <div id="cases-page" class="page">
            <h2 style="margin-bottom: 20px;">Кейсы</h2>
            <div class="case-card">
                <div class="case-info"><h3>📦 Бомж</h3><p>Цена: 100 ⭐</p></div>
                <button class="buy-btn" onclick="buy(100)">Open</button>
            </div>
            <div class="case-card">
                <div class="case-info"><h3>💼 Работяга</h3><p>Цена: 200 ⭐</p></div>
                <button class="buy-btn" onclick="buy(200)">Open</button>
            </div>
            <div class="case-card">
                <div class="case-info"><h3>🎰 Лудка</h3><p>Цена: 500 ⭐</p></div>
                <button class="buy-btn" onclick="buy(500)">Open</button>
            </div>
            <div class="case-card">
                <div class="case-info"><h3>🏎️ Мажор</h3><p>Цена: 1000 ⭐</p></div>
                <button class="buy-btn" onclick="buy(1000)">Open</button>
            </div>
            <div class="case-card">
                <div class="case-info"><h3>🚀 ЗАНОС</h3><p>Цена: 1999 ⭐</p></div>
                <button class="buy-btn" onclick="buy(1999)">Open</button>
            </div>
        </div>

        <div id="top-page" class="page">
            <h2 style="margin-bottom: 20px;">Live Лидеры</h2>
            <div id="leaderboard">
                <div class="leader-row"><span><span class="status-dot"></span>Pinchuchela</span> <span>99k</span></div>
                <div class="leader-row"><span><span class="status-dot"></span>Nazar</span> <span>45k</span></div>
                <div class="leader-row"><span><span class="status-dot"></span>You</span> <span id="my-top">0</span></div>
            </div>
        </div>
    </div>

    <div class="nav">
        <button class="nav-item active" onclick="showPage('game-page', this)">ГЛАВНАЯ</button>
        <button class="nav-item" onclick="showPage('cases-page', this)">КЕЙСЫ</button>
        <button class="nav-item" onclick="showPage('top-page', this)">ЛИДЕРЫ</button>
    </div>

    <script>
        let balance = 0;
        let tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById('coin-btn').onclick = () => {
            balance += 10;
            updateUI();
            tg.HapticFeedback.impactOccurred('medium');
        };

        function updateUI() {
            document.getElementById('balance').innerText = balance.toLocaleString();
            let stars = (balance / 10).toFixed(0);
            document.getElementById('stars').innerText = stars;
            document.getElementById('my-top').innerText = (balance/1000).toFixed(1) + "k";
        }

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function buy(costStars) {
            let userStars = balance / 10;
            if (userStars >= costStars) {
                balance -= (costStars * 10);
                updateUI();
                alert("Кейс открыт! Скин добавлен в инвентарь.");
            } else {
                alert("Не хватает Stars! Нужно еще " + (costStars - userStars).toFixed(0));
            }
        }
    </script>
</body>
</html>
