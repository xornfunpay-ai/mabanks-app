<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --glass: rgba(255, 255, 255, 0.1);
            --gold: #FFD700;
        }

        body {
            background: var(--ios-bg);
            color: white;
            font-family: -apple-system, sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Glassmorphism Header */
        .header {
            backdrop-filter: blur(20px);
            background: var(--glass);
            padding: 25px;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            z-index: 10;
        }

        .balance-label { font-size: 14px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
        .balance-value { font-size: 36px; font-weight: 800; color: var(--gold); margin-top: 5px; }
        .stars-value { font-size: 16px; color: #00FF00; opacity: 0.9; }

        /* Контент страниц */
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; z-index: 5; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Тап-зона с 3D */
        .tap-area { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; position: relative; }
        #canvas-3d { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .score-display {
            font-size: 60px; font-weight: 800; color: white;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 20; opacity: 0.2; pointer-events: none;
        }

        /* Навигация iOS */
        .nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(20px); border-radius: 30px;
            display: flex; justify-content: space-around; padding: 15px 0;
            border: 0.5px solid rgba(255, 255, 255, 0.1); z-index: 30;
        }
        .nav-item { color: #8E8E93; border: none; background: none; font-size: 12px; font-weight: 600; cursor: pointer;}
        .nav-item.active { color: white; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-label">Баланс MBA Tokens</div>
        <div class="balance-value" id="balance">0</div>
        <div class="stars-value">≈ <span id="stars">0</span> ⭐ Stars</div>
    </div>

    <div class="content">
        <div id="game-page" class="page active" style="height: 100%;">
            <div class="tap-area">
                <canvas id="canvas-3d"></canvas>
                <div class="score-display" id="tap-score">+10</div>
            </div>
        </div>

        <div id="cases-page" class="page">
            <h2 style="margin-bottom: 20px;">Кейсы</h2>
            <p style="opacity: 0.5">Кейсы Pinchuk Edition: Бомж, Работяга, Мажор...<br>Для примера, нажми ГЛАВНАЯ.</p>
        </div>
    </div>

    <div class="nav">
        <button class="nav-item active" onclick="showPage('game-page', this)">ГЛАВНАЯ</button>
        <button class="nav-item" onclick="showPage('cases-page', this)">КЕЙСЫ</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let balance = 0;
        let tg = window.Telegram.WebApp;
        tg.expand();

        // --- ЛОГИКА 3D ---
        const canvas = document.getElementById('canvas-3d');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / (window.innerHeight * 0.7), 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight * 0.7);

        // Создаем монетку (цилиндр)
        const geometry = new THREE.CylinderGeometry(2, 2, 0.3, 100);
        const material = new THREE.MeshPhongMaterial({ 
            color: 0xFFD700, // Золото
            specular: 0x222222, // Блеск
            shininess: 100, // Яркость блеска
            shading: THREE.FlatShading
        });
        const coin = new THREE.Mesh(geometry, material);
        scene.add(coin);

        // Поворачиваем монетку, чтобы она стояла
        coin.rotation.x = Math.PI / 2;

        // Добавляем свет
        const ambientLight = new THREE.AmbientLight(0x404040); // Рассеянный свет
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1); // Направленный свет (как солнце)
        directionalLight.position.set(1, 1, 1).normalize();
        scene.add(directionalLight);

        camera.position.z = 5;

        // Обработка тапа на 3D монету
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        canvas.addEventListener('touchstart', onTouchStart, false);

        function onTouchStart(event) {
            // Преобразуем координаты касания
            mouse.x = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
            mouse.y = - (event.touches[0].clientY / (window.innerHeight * 0.7)) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children);

            if (intersects.length > 0) {
                // Если попали по монете
                balance += 10;
                updateUI();
                tg.HapticFeedback.impactOccurred('medium');

                // Анимация тапа
                coin.rotation.x -= 0.2; // Наклоняем
                setTimeout(() => coin.rotation.x += 0.2, 50); // Возвращаем
            }
        }

        // Рендеринг (постоянный цикл)
        function animate() {
            requestAnimationFrame(animate);
            // Медленное вращение
            coin.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();

        // --- ЛОГИКА ИНТЕРФЕЙСА ---
        function updateUI() {
            document.getElementById('balance').innerText = balance.toLocaleString();
            let stars = (balance / 10).toFixed(0);
            document.getElementById('stars').innerText = stars;
        }

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
