<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MBA Case Clicker — Тапалка + Кейсы + Реальный кошелёк</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0d1a, #020408);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
            color: #f0f3fc;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #11151f;
        }
        ::-webkit-scrollbar-thumb {
            background: #f5a623;
            border-radius: 12px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1.2rem 2rem 3rem;
        }

        /* Верхняя панель: кошелёк и баланс MBA */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            background: rgba(0,0,0,0.3);
            padding: 0.8rem 1.5rem;
            border-radius: 80px;
            backdrop-filter: blur(8px);
        }
        .wallet-button {
            background: rgba(20, 28, 40, 0.9);
            border: 1px solid rgba(245, 166, 35, 0.6);
            padding: 0.6rem 1.4rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
        }
        .wallet-button:hover {
            border-color: #f5a623;
            background: #1f2a3e;
        }
        .wallet-connected {
            border-color: #2ecc71;
            background: #0e2a1c;
        }
        .mba-balance {
            background: linear-gradient(135deg, #1f2a3e, #0f1222);
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.3rem;
            border: 1px solid #f5a62380;
        }
        .mba-balance span {
            color: #f5a623;
            font-size: 1.5rem;
            margin-right: 6px;
        }

        /* Hero + тапалка */
        .tap-section {
            text-align: center;
            margin: 2rem 0 2rem;
        }
        .tap-button {
            background: radial-gradient(circle at 30% 20%, #f5a623, #c97e0a);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            cursor: pointer;
            box-shadow: 0 20px 30px rgba(0,0,0,0.4), 0 0 0 8px rgba(245,166,35,0.2);
            transition: 0.05s linear;
            user-select: none;
        }
        .tap-button:active {
            transform: scale(0.96);
            box-shadow: 0 8px 20px black;
        }
        .tap-emoji {
            font-size: 5rem;
        }
        .tap-text {
            font-size: 1.8rem;
            font-weight: 800;
            margin-top: 8px;
        }
        .tap-earn {
            margin-top: 1rem;
            font-size: 1rem;
            color: #f5c27b;
        }

        /* Анимация прокрутки */
        .scroll-reveal {
            opacity: 0;
            transform: translateY(32px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .scroll-reveal.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        /* Сетка кейсов */
        .cases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
            margin: 2.5rem 0;
        }

        /* Карточка кейса */
        .case-card {
            background: rgba(18, 22, 45, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            border: 1px solid rgba(245, 166, 35, 0.4);
            transition: transform 0.2s, border 0.2s;
            overflow: hidden;
            position: relative;
        }
        .case-card:hover {
            transform: translateY(-5px);
            border-color: #f5a623;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.2rem 1.2rem 0.5rem;
        }
        .case-icon {
            font-size: 2.8rem;
        }
        .case-title h3 {
            font-size: 1.4rem;
            font-weight: 700;
        }
        .case-price {
            background: #f5a62320;
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            margin-top: 5px;
            font-weight: bold;
        }
        .card-preview {
            padding: 0 1.2rem 0.8rem;
            font-size: 0.8rem;
            color: #b9c3e6;
        }
        .nft-preview {
            padding: 0.6rem 1.2rem 1.2rem;
            border-top: 1px solid rgba(255,255,240,0.08);
            display: flex;
            justify-content: space-between;
            font-size: 1.3rem;
        }
        .open-case-btn {
            background: #f5a623;
            margin: 0 1rem 1.2rem 1rem;
            border: none;
            padding: 0.6rem;
            border-radius: 40px;
            font-weight: bold;
            color: #0c0f1a;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        .open-case-btn:active {
            transform: scale(0.97);
        }
        .open-case-btn.disabled {
            background: #4a5568;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Модалка результата */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.open {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: linear-gradient(145deg, #1a1f33, #0c0f1c);
            border-radius: 2rem;
            max-width: 360px;
            width: 85%;
            padding: 2rem;
            text-align: center;
            border: 1px solid #f5a623;
        }
        .modal-icon {
            font-size: 4rem;
        }
        .close-modal {
            background: #f5a623;
            border: none;
            padding: 0.5rem 1.8rem;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 1rem;
            cursor: pointer;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            color: #5f6e97;
            font-size: 0.75rem;
        }
        @media (max-width: 700px) {
            .container {
                padding: 1rem;
            }
            .tap-button {
                width: 150px;
                height: 150px;
            }
            .tap-emoji {
                font-size: 3.5rem;
            }
        }
        .shake-animation {
            animation: shakeTap 0.2s ease-in-out 0s 2;
        }
        @keyframes shakeTap {
            0% { transform: translate(1px, 1px);}
            50% { transform: translate(-2px, 0px);}
            100% { transform: translate(0,0);}
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div class="wallet-button" id="realWalletBtn">
            🔌 <span id="walletStatusText">Подключить Web3</span>
        </div>
        <div class="mba-balance">
            <span>💰 MBA</span> <span id="mbaAmount">0</span>
        </div>
    </div>

    <div class="tap-section scroll-reveal">
        <div class="tap-button" id="tapButton">
            <div class="tap-emoji">💎</div>
            <div class="tap-text">TAP</div>
        </div>
        <div class="tap-earn">+1 MBA за клик</div>
        <p style="font-size:0.8rem; margin-top:10px;">Копи валюту и открывай кейсы с NFT!</p>
    </div>

    <div class="cases-grid" id="casesContainer"></div>
    <footer class="scroll-reveal">
        🔥 Реальное Web3 подключение (MetaMask). Кликай на 💎, зарабатывай MBA, открывай кейсы. NFT выпадают по шансам!
    </footer>
</div>

<!-- Модалка -->
<div id="resultModal" class="modal">
    <div class="modal-content">
        <div class="modal-icon" id="modalIcon">🎁</div>
        <h3 id="modalTitle">Кейс открыт!</h3>
        <p id="modalNftName" style="font-size: 1.4rem; font-weight: bold; margin: 0.5rem 0;">NFT</p>
        <div class="modal-chance" id="modalChance" style="background:#2a2f44; padding:0.2rem 1rem; border-radius:20px;">Шанс: --</div>
        <button class="close-modal" id="closeModalBtn">Закрыть</button>
    </div>
</div>

<script>
    // ---------- 1. ВАЛЮТА MBA ----------
    let mbaBalance = 0;
    const mbaSpan = document.getElementById("mbaAmount");
    
    function updateMBAUI() {
        mbaSpan.innerText = Math.floor(mbaBalance);
    }
    
    // Тапалка: +1 MBA за клик
    const tapBtn = document.getElementById("tapButton");
    tapBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        mbaBalance += 1;
        updateMBAUI();
        // визуальный фидбек
        tapBtn.classList.add("shake-animation");
        setTimeout(() => tapBtn.classList.remove("shake-animation"), 200);
        // мини-всплывашка (эффект)
        const floating = document.createElement("div");
        floating.innerText = "+1 MBA";
        floating.style.position = "fixed";
        floating.style.left = e.clientX + "px";
        floating.style.top = e.clientY - 20 + "px";
        floating.style.color = "#f5a623";
        floating.style.fontWeight = "bold";
        floating.style.pointerEvents = "none";
        floating.style.zIndex = "999";
        floating.style.fontSize = "1.2rem";
        document.body.appendChild(floating);
        setTimeout(() => floating.remove(), 600);
    });
    
    // ---------- 2. ДАННЫЕ КЕЙСОВ + ЦЕНА В MBA ----------
    const CASES = [
        { id: "bomzh", name: "КЕЙС БОМЖ", icon: "🧦", tag: "⭐️ Уличный", price: 25,
          nfts: [
            { name: "Грязный носок", icon: "🧦", chance: 48.5 },
            { name: "Рваная кепка", icon: "🧢", chance: 32 },
            { name: "Пакет с секретом", icon: "🛍️", chance: 12 },
            { name: "Золотая карта метро", icon: "💳", chance: 6 },
            { name: "Легендарный кот", icon: "🐈‍⬛", chance: 1.5 }
        ]},
        { id: "rabotyaga", name: "КЕЙС РАБОТЯГА", icon: "🔨", tag: "💼 Трудяга", price: 40,
          nfts: [
            { name: "Потертая спецовка", icon: "👕", chance: 40 },
            { name: "Ржавый ключ", icon: "🔧", chance: 28 },
            { name: "Кофе в стакане", icon: "☕️", chance: 15 },
            { name: "Уставший взгляд", icon: "😩", chance: 10 },
            { name: "Золотая каска", icon: "⛑️", chance: 7 }
        ]},
        { id: "ludka", name: "КЕЙС ЛУДКА", icon: "🎣", tag: "🐟 Рыбак", price: 55,
          nfts: [
            { name: "Ржавый крючок", icon: "🪝", chance: 45 },
            { name: "Резиновый сапог", icon: "👢", chance: 25 },
            { name: "Старая лодка", icon: "🛶", chance: 12 },
            { name: "Сом-мутант", icon: "🐟", chance: 10 },
            { name: "Золотая удочка", icon: "🎣", chance: 8 }
        ]},
        { id: "zanos", name: "КЕЙС ЗАНОС", icon: "💨", tag: "🏎️ Дрифт", price: 70,
          nfts: [
            { name: "Проколотая шина", icon: "🛞", chance: 38 },
            { name: "Дым из-под колес", icon: "🌫️", chance: 27 },
            { name: "Наклейка Drift King", icon: "👑", chance: 18 },
            { name: "Турбина с секретом", icon: "⚙️", chance: 10 },
            { name: "Легендарный занос", icon: "🔥", chance: 7 }
        ]},
        { id: "major", name: "КЕЙС МАЖОР", icon: "💎", tag: "💰 Люкс", price: 100,
          nfts: [
            { name: "Золотая кредитка", icon: "💳", chance: 35 },
            { name: "Яхта в аренду", icon: "⛵", chance: 25 },
            { name: "Часы Rolex", icon: "⌚", chance: 18 },
            { name: "Пентхаус в Дубае", icon: "🏙️", chance: 12 },
            { name: "Частный самолет", icon: "✈️", chance: 10 }
        ]},
        { id: "bro", name: "КЕЙС БРО", icon: "🤜🤛", tag: "🏆 Дружбан", price: 85,
          nfts: [
            { name: "Бро-фистбамп", icon: "👊", chance: 44 },
            { name: "Банка энергоса", icon: "⚡", chance: 26 },
            { name: "Кроссовки бро", icon: "👟", chance: 15 },
            { name: "Золотая цепь", icon: "⛓️", chance: 10 },
            { name: "Брат навсегда", icon: "🤝", chance: 5 }
        ]}
    ];
    
    // Функция выбора NFT по шансам
    function rollNFT(nftList) {
        let total = nftList.reduce((s, n) => s + n.chance, 0);
        let rand = Math.random() * total;
        let accum = 0;
        for (let n of nftList) {
            accum += n.chance;
            if (rand <= accum) return n;
        }
        return nftList[0];
    }
    
    // Модалка
    const modal = document.getElementById("resultModal");
    const modalIcon = document.getElementById("modalIcon");
    const modalTitle = document.getElementById("modalTitle");
    const modalNftName = document.getElementById("modalNftName");
    const modalChance = document.getElementById("modalChance");
    const closeModalBtn = document.getElementById("closeModalBtn");
    
    function showResult(caseName, nft) {
        modalIcon.innerText = nft.icon;
        modalTitle.innerText = `🎲 ${caseName} 🎲`;
        modalNftName.innerText = nft.name;
        modalChance.innerText = `Шанс: ${nft.chance}%`;
        modal.classList.add("open");
    }
    function closeModalFunc() {
        modal.classList.remove("open");
    }
    closeModalBtn.addEventListener("click", closeModalFunc);
    modal.addEventListener("click", (e) => { if(e.target === modal) closeModalFunc(); });
    
    // Открытие кейса (трата MBA)
    function tryOpenCase(caseData, buttonElement, cardElement) {
        if (mbaBalance < caseData.price) {
            alert(`❌ Не хватает MBA! Нужно ${caseData.price} MBA. Заработай тапами!`);
            return;
        }
        // списываем валюту
        mbaBalance -= caseData.price;
        updateMBAUI();
        
        // анимация на карточке
        cardElement.classList.add("shake-animation");
        setTimeout(() => cardElement.classList.remove("shake-animation"), 300);
        
        const wonNft = rollNFT(caseData.nfts);
        
        // Логирование + реальный кошелёк если подключён
        if (window.userWalletConnected && window.userAddress) {
            console.log(`🔗 [WEB3: ${window.userAddress}] Открыт кейс "${caseData.name}" | -${caseData.price} MBA | Выпал: ${wonNft.name} (${wonNft.chance}%)`);
        } else {
            console.log(`👤 [ГОСТЬ] Открыт кейс "${caseData.name}" | -${caseData.price} MBA | Выпал: ${wonNft.name} (${wonNft.chance}%)`);
        }
        
        showResult(caseData.name, wonNft);
    }
    
    // Рендер карточек
    function renderCases() {
        const container = document.getElementById("casesContainer");
        container.innerHTML = "";
        CASES.forEach(c => {
            const card = document.createElement("div");
            card.className = "case-card scroll-reveal";
            
            const header = document.createElement("div");
            header.className = "card-header";
            header.innerHTML = `
                <div class="case-icon">${c.icon}</div>
                <div class="case-title">
                    <h3>${c.name}</h3>
                    <div class="case-price">💰 ${c.price} MBA</div>
                </div>
            `;
            const desc = document.createElement("div");
            desc.className = "card-preview";
            desc.innerText = `Редкие NFT внутри`;
            const previewDiv = document.createElement("div");
            previewDiv.className = "nft-preview";
            const iconsShort = c.nfts.slice(0,4).map(n=>n.icon).join(" ");
            previewDiv.innerHTML = iconsShort + (c.nfts.length > 4 ? " ..." : "");
            
            const openBtn = document.createElement("button");
            openBtn.className = "open-case-btn";
            openBtn.innerHTML = `🔓 ОТКРЫТЬ КЕЙС 🔓`;
            
            card.appendChild(header);
            card.appendChild(desc);
            card.appendChild(previewDiv);
            card.appendChild(openBtn);
            
            openBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                tryOpenCase(c, openBtn, card);
            });
            container.appendChild(card);
        });
    }
    
    // ---------- 3. РЕАЛЬНОЕ ПОДКЛЮЧЕНИЕ КОШЕЛЬКА (MetaMask) ----------
    window.userWalletConnected = false;
    window.userAddress = null;
    const walletBtnReal = document.getElementById("realWalletBtn");
    const walletStatusSpan = document.getElementById("walletStatusText");
    
    async function connectRealWallet() {
        if (!window.ethereum) {
            alert("❌ MetaMask не найден! Установите расширение для Web3.");
            walletStatusSpan.innerText = "⚠️ Нет кошелька";
            return false;
        }
        try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            if (accounts.length === 0) throw new Error("Нет аккаунтов");
            const addr = accounts[0];
            window.userAddress = addr;
            window.userWalletConnected = true;
            const short = addr.slice(0,6)+"..."+addr.slice(-4);
            walletStatusSpan.innerHTML = `🟢 ${short}`;
            walletBtnReal.classList.add("wallet-connected");
            
            // отслеживаем смену аккаунта
            window.ethereum.on('accountsChanged', (newAcc) => {
                if (newAcc.length === 0) {
                    window.userWalletConnected = false;
                    window.userAddress = null;
                    walletStatusSpan.innerHTML = `🔌 Подключить Web3`;
                    walletBtnReal.classList.remove("wallet-connected");
                } else {
                    window.userAddress = newAcc[0];
                    window.userWalletConnected = true;
                    const shortNew = newAcc[0].slice(0,6)+"..."+newAcc[0].slice(-4);
                    walletStatusSpan.innerHTML = `🟢 ${shortNew}`;
                }
            });
            return true;
        } catch(err) {
            console.error(err);
            alert("Ошибка подключения: " + err.message);
            return false;
        }
    }
    
    walletBtnReal.addEventListener("click", async () => {
        if (window.userWalletConnected) {
            // чисто визуально отключаем (но Metamask не позволяет отключиться, просто сбрасываем флаг)
            window.userWalletConnected = false;
            window.userAddress = null;
            walletStatusSpan.innerHTML = `🔌 Подключить Web3`;
            walletBtnReal.classList.remove("wallet-connected");
        } else {
            await connectRealWallet();
        }
    });
    
    // автоматическая проверка если уже был доступ
    if (window.ethereum && window.ethereum.selectedAddress) {
        window.ethereum.request({ method: 'eth_accounts' }).then(acc => {
            if (acc && acc.length) {
                window.userAddress = acc[0];
                window.userWalletConnected = true;
                const short = acc[0].slice(0,6)+"..."+acc[0].slice(-4);
                walletStatusSpan.innerHTML = `🟢 ${short}`;
                walletBtnReal.classList.add("wallet-connected");
            }
        }).catch(()=>{});
    }
    
    // ---------- 4. АНИМАЦИЯ ПРОКРУТКИ (Intersection Observer) ----------
    function initScrollAnimation() {
        const elements = document.querySelectorAll('.scroll-reveal');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('revealed');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.15, rootMargin: "0px 0px -20px 0px" });
        elements.forEach(el => observer.observe(el));
    }
    
    // Старт приложения
    function init() {
        renderCases();
        initScrollAnimation();
        updateMBAUI();
        // добавим небольшую задержку для повторной проверки видимых элементов
        setTimeout(() => {
            document.querySelectorAll('.scroll-reveal').forEach(el => {
                const rect = el.getBoundingClientRect();
                if (rect.top < window.innerHeight - 100) el.classList.add('revealed');
            });
        }, 200);
    }
    init();
</script>
</body>
</html>
