<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        :root {
            --bg: #2b1d63;
            --panel: #4a34a8;
            --accent: #ffcb05;
            --btn-orange: #ff8c00;
            --text: #ffffff;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Luckiest Guy', cursive; margin: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            display: flex; justify-content: space-between; padding: 15px;
            background: rgba(0,0,0,0.3); border-bottom: 4px solid rgba(0,0,0,0.2);
        }

        .balance-box {
            background: #1a1a1a; padding: 5px 15px; border-radius: 50px;
            border: 3px solid #333; display: flex; align-items: center; gap: 10px;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.5);
        }

        /* Тапалка */
        .tap-content {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; position: relative;
        }

        .coin-btn {
            width: 280px; height: 280px;
            background: url('https://i.ibb.co/Gfjby14B/maba-coin.png') center/contain no-repeat;
            border: none; outline: none; cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 0 rgba(0,0,0,0.3));
        }
        .coin-btn:active { transform: scale(0.85) rotate(5deg); }

        /* Кейсы Мультяшные */
        .case-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px;
        }
        .case-card {
            background: var(--panel); border: 4px solid #ffffff20;
            border-radius: 20px; padding: 15px; text-align: center;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
        }
        .case-icon { font-size: 50px; margin-bottom: 10px; display: block; }
        .buy-btn {
            background: var(--btn-orange); border: none; padding: 10px;
            border-radius: 12px; color: white; font-family: 'Luckiest Guy';
            width: 100%; border-bottom: 4px solid #b36200; margin-top: 10px;
        }

        /* Меню */
        .nav {
            background: #1a1a1a; display: flex; justify-content: space-around;
            padding: 10px 0 30px; border-top: 5px solid #333;
        }
        .nav-item { color: #888; font-size: 24px; border: none; background: none; }
        .nav-item.active { color: var(--accent); transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="balance-box">
            <span style="color: #00f2ff;">💎</span> <span id="mba">0</span>
        </div>
        <div class="balance-box" onclick="depositStars()">
            <span style="color: #ffcb05;">★</span> <span id="stars">0</span>
            <span style="background: #00ff00; border-radius: 50%; width: 20px; height: 20px; color: black; line-height: 20px;">+</span>
        </div>
    </div>

    <div id="game" class="page active">
        <div class="tap-content">
            <button class="coin-btn" id="tap"></button>
            <h2 style="color: var(--accent); text-shadow: 2px 2px 0 #000;">TAP TAP!</h2>
        </div>
    </div>

    <div id="shop" class="page" style="display:none; overflow-y: auto;">
        <div class="case-grid">
            <div class="case-card">
                <span class="case-icon">📦</span>
                <div>БОМЖ</div>
                <button class="buy-btn" onclick="openCase('Бомж', 100)">100 ★</button>
            </div>
            <div class="case-card">
                <span class="case-icon">💼</span>
                <div>РАБОТЯГА</div>
                <button class="buy-btn" onclick="openCase('Работяга', 200)">200 ★</button>
            </div>
            </div>
    </div>

    <div class="nav">
        <button class="nav-item active" onclick="show('game', this)"><i class="fas fa-gamepad"></i></button>
        <button class="nav-item" onclick="show('shop', this)"><i class="fas fa-shopping-cart"></i></button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let mba = 0; let stars = 0;

        document.getElementById('tap').onclick = () => {
            mba += 10;
            document.getElementById('mba').innerText = mba;
            tg.HapticFeedback.impactOccurred('medium');
        };

        function show(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            btn.classList.add('active');
        }

        // ВЫЗОВ ОПЛАТЫ
        function depositStars() {
            // Отправляем боту сигнал выставить счет
            tg.sendData(JSON.stringify({action: "create_invoice", amount: 50})); 
        }

        function openCase(name, price) {
            if (stars >= price) {
                stars -= price;
                document.getElementById('stars').innerText = stars;
                alert("Кейс открыт!");
            } else {
                alert("Мало Звезд! Нажми на + сверху.");
            }
        }
    </script>
</body>
</html>
